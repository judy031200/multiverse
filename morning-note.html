<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WeHa Lens | Morning Brief</title>

    <link rel="icon" href="assets/img/logo.png">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/morning-note.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="header-left">

            <img src="assets/img/logo.png" class="logo">

        </div>

        <div class="header-right">

            <h1>WeHa Lens</h1>

            <div class="sub-title">

                Morning Brief

            </div>

            <div id="today"></div>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="wrapper">

        <!-- LEFT -->

        <section class="left-panel">

            <!-- Quốc tế -->

            <div class="news-card">

                <div class="title">

                    🌍 ĐIỂM TIN QUỐC TẾ

                </div>

                <div id="international"></div>

            </div>

            <!-- Trong nước -->

            <div class="news-card">

                <div class="title">

                    🇻🇳 ĐIỂM TIN TRONG NƯỚC

                </div>

                <div id="domestic"></div>

            </div>

            <!-- Doanh nghiệp -->

            <div class="news-card">

                <div class="title">

                    🏢 TIN DOANH NGHIỆP

                </div>

                <div id="corporate"></div>

            </div>

            <!-- Tin khác -->

            <div class="news-card">

                <div class="title">

                    📌 TIN KHÁC

                </div>

                <div id="other"></div>

            </div>

        </section>

        <!-- RIGHT -->

        <aside class="right-panel">

            <div class="market-card">

                <h2>

                    📊 Chỉ số thị trường

                </h2>

                <table class="market-table">

                    <thead>

                        <tr>

                            <th>Chỉ số</th>

                            <th>Điểm</th>

                            <th>+/-</th>

                            <th>%</th>

                        </tr>

                    </thead>

                    <tbody id="marketTable">

                    </tbody>

                </table>

            </div>

        </aside>

    </main>

    <!-- ================= WATERMARK ================= -->

    <div class="watermark">

        <img src="assets/img/watermark.png">

    </div>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="footer-left">

            <div>

                📧 hello@weha.com.vn

            </div>

            <div>

                🌐 weha.com.vn

            </div>

        </div>

        <div class="footer-right">

            <img src="assets/img/qr.png" class="qr">

        </div>

    </footer>

    <!-- ================= EXPORT ================= -->

    <button id="btnExport">

        📸 Xuất PNG

    </button>

    <!-- html2canvas -->

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- JS -->

    <script src="assets/js/common.js"></script>

    <script src="assets/js/morning-note.js"></script>

</body>

</html>
