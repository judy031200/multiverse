<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tra cứu báo cáo theo mã cổ phiếu </title>

<meta name="description"
content="Tra cứu toàn bộ báo cáo phân tích theo mã cổ phiếu.">

<link rel="canonical"
href="https://judy031200.github.io/multiverse/tra-cuu.html">

<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<!-- Header dùng chung -->
<div id="app-header"></div>

<!-- ================= PAGE ================= -->

<div class="page">

    <div class="tab-panel active" id="panel-ticker">

        <!-- SEARCH -->

        <div class="ticker-search-box">

            <div class="ticker-input-wrap">

                <svg width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2">

                    <circle cx="11" cy="11" r="8"/>

                    <path d="m21 21-4.35-4.35"/>

                </svg>

                <input

                    type="text"

                    id="ticker-input"

                    placeholder="Nhập mã (VD: ACB)"

                    maxlength="10"

                    onkeydown="if(event.key==='Enter')searchTicker()"

                    oninput="this.value=this.value.toUpperCase()"

                >

            </div>

            <button

                class="btn-primary"

                onclick="searchTicker()"

            >

                Tìm báo cáo

            </button>

            <span

                class="ticker-hint"

                id="ticker-hint"

            >

                Nhập mã và nhấn Tìm

            </span>

            <div class="toolbar-spacer"></div>

            <div

                class="history-wrap"

                id="history-wrap"

                style="display:none;"

            >

                <span class="history-label">

                    Gần đây:

                </span>

                <div id="history-chips"></div>

            </div>

        </div>

        <!-- CONSENSUS -->

        <div

            id="ticker-consensus"

            style="display:none;"

        >

            <div

                class="consensus-bar"

                id="consensus-bar"

            ></div>

            <div

                class="stats-bar"

                id="stats-bar"

            ></div>

            <div class="ticker-filter-row">

                <div class="custom-select">

                    <select

                        id="ticker-src-filter"

                        onchange="filterTickerTable()"

                    >

                        <option value="">

                            Tất cả CTCK

                        </option>

                    </select>

                </div>

                <div class="custom-select">

                    <select

                        id="ticker-rec-filter"

                        onchange="filterTickerTable()"

                    >

                        <option value="">

                            Tất cả KN

                        </option>

                        <option value="MUA">

                            Mua

                        </option>

                        <option value="KHẢ QUAN">

                            Khả quan

                        </option>

                        <option value="TRUNG LẬP">

                            Trung lập

                        </option>

                    </select>

                </div>

                <span

                    class="result-count"

                    id="ticker-result-count"

                    style="margin:0;"

                ></span>

            </div>

        </div>

        <!-- TABLE -->

        <div

            class="table-wrap"

            id="ticker-table-wrap"

            style="display:none;"

        >

            <table>

                <thead>

                    <tr>

                        <th

                            class="date-cell sort-desc"

                            onclick="toggleTickerSort()"

                        >

                            Ngày

                        </th>

                        <th>

                            Tiêu đề

                        </th>

                        <th class="source-col">

                            CTCK

                        </th>

                        <th class="rec-col">

                            Khuyến nghị

                        </th>

                        <th

                            class="price-col"

                            style="text-align:right"

                        >

                            Giá MT

                        </th>

                        <th class="dl-col">

                            Tải

                        </th>

                    </tr>

                </thead>

                <tbody id="ticker-tbody">

                </tbody>

            </table>

        </div>

        <!-- MOBILE -->

        <div

            class="card-list"

            id="ticker-card-list"

        ></div>

    </div>

</div>

<!-- Footer dùng chung -->

<div id="app-footer"></div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/ticker.js"></script>

</body>

</html>
