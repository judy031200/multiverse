<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lịch sự kiện cổ tức, phát hành thêm | Báo Cáo & Cổ Phiếu</title>
<meta name="description" content="Lịch sự kiện doanh nghiệp: ngày giao dịch không hưởng quyền, ngày thanh toán cổ tức, phát hành thêm cổ phiếu.">
<link rel="canonical" href="https://judy031200.github.io/fullreport/su-kien.html">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="page">
  <div class="page-title">📊 Báo Cáo & Cổ Phiếu</div>
  <div class="page-subtitle">Báo cáo phân tích · Tra cứu mã · Tín hiệu · Sự kiện · Nhật ký đầu tư</div>

  <div class="tabs">
    <a class="tab-btn" href="index.html">🗂 Tất cả báo cáo</a>
    <a class="tab-btn" href="tra-cuu.html">🔍 Tra cứu mã</a>
    <a class="tab-btn" href="tin-hieu.html">⚡ Tín hiệu</a>
    <a class="tab-btn active" href="su-kien.html">📅 Sự kiện</a>
    <a class="tab-btn" href="nhat-ky.html">📓 Nhật ký đầu tư</a>
  </div>

  <div class="tab-panel" id="panel-events">
    <div class="ev-toolbar">
      <span class="pb-label">Từ ngày:</span><input type="date" class="pb-date" id="ev-from">
      <span class="pb-label">Đến ngày:</span><input type="date" class="pb-date" id="ev-to">
      <button class="btn-outline" onclick="setEvToday()" style="padding:6px 12px;font-size:12px;white-space:nowrap;">Hôm nay</button>
      <div class="custom-select"><select id="ev-type" onchange="setEvType(this.value)"><option value="ISS,DIV">Tất cả</option><option value="DIV">Cổ tức</option><option value="ISS">Phát hành thêm</option></select></div>
      <div class="search-wrap" style="max-width:180px;flex:1;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="ev-search" placeholder="Tìm mã..." oninput="filterEvents()">
      </div>
      <button class="btn-primary" onclick="loadEvents()">Tải</button>
      <div style="display:flex;gap:4px;">
        <button id="ev-view-table" class="btn-primary" onclick="setEvView('table')" style="padding:7px 10px;">☰</button>
        <button id="ev-view-cal"   class="btn-outline" onclick="setEvView('cal')"   style="padding:7px 10px;">📅</button>
      </div>
      <span class="pb-count" id="ev-count-label"></span>
    </div>
    <div class="table-wrap" id="ev-table-wrap">
      <table><thead><tr>
        <th style="width:70px;">Mã</th>
        <th style="width:120px;" id="ev-th-type" onclick="sortEvents('eventCode')">Loại</th>
        <th style="cursor:default;">Nội dung</th>
        <th style="width:105px;" id="ev-th-pub" class="sort-desc" onclick="sortEvents('publicDate')">Ngày TB</th>
        <th style="width:105px;" id="ev-th-gdkhq" onclick="sortEvents('displayDate1')">Ngày GDKHQ</th>
        <th style="width:110px;" id="ev-th-pay" onclick="sortEvents('payoutDate')">Ngày thực hiện</th>
        <th style="width:110px;text-align:right;cursor:default;">Giá trị/CP</th>
      </tr></thead>
      <tbody id="ev-tbody"><tr class="state-row"><td colspan="7">Nhấn "Tải" để xem sự kiện</td></tr></tbody></table>
    </div>
    <div class="card-list" id="ev-card-list"></div>
    <div id="ev-calendar" style="display:none;"></div>
  </div>

</div>
<script src="assets/js/common.js"></script>
<script src="assets/js/events.js"></script>
</body>
</html>
